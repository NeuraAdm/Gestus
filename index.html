            "mainEntity": [
              {
                "@type": "Question",
                "name": "¿Mi empresa está obligada a implementar el SG-SST?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Sí. En Colombia todas las empresas con al menos un trabajador deben implementar el SG-SST (Sistema de Gestión de Seguridad y Salud en el Trabajo) según el Decreto 1072 de 2015 y la Resolución 0312 de 2019. El nivel de cumplimiento depende del tamaño de la empresa y el nivel de riesgo de la actividad económica."
                }
              },
              {
                "@type": "Question",
                "name": "¿Qué documentos debo tener para una visita del Ministerio de Trabajo?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Para una visita del Ministerio de Trabajo debe contar con: política SST, objetivos del SG-SST, matriz legal, plan anual de trabajo, plan de capacitación, matriz de peligros y riesgos, evidencias de ejecución de actividades, investigaciones de accidentes de trabajo y actas del COPASST cuando apliquen."
                }
              },
              {
                "@type": "Question",
                "name": "¿Qué hacer ante un accidente laboral?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Ante un accidente de trabajo debe: reportar el evento a la ARL dentro de los 2 días hábiles siguientes, diligenciar el FURAT (Formulario Único de Reporte de Accidente de Trabajo), adelantar la investigación del accidente con el equipo SST o el COPASST, y definir acciones correctivas para prevenir la recurrencia del evento."
                }
              },
              {
                "@type": "Question",
                "name": "¿Cada cuánto se actualiza la matriz de riesgos?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "La matriz de riesgos e identificación de peligros debe revisarse y actualizarse al menos una vez al año y cada vez que existan cambios en procesos, equipos, materiales, instalaciones, incidentes o condiciones de trabajo. Esto garantiza el control efectivo de los riesgos laborales y el cumplimiento normativo."
                }
              },
              {
                "@type": "Question",
                "name": "¿Cómo se gestionan los riesgos psicosociales en el trabajo?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "La gestión de riesgos psicosociales requiere aplicar la batería de riesgo psicosocial del Ministerio de Salud, implementar planes de intervención según los resultados, realizar seguimiento a los indicadores de salud mental, y promover la prevención del estrés laboral y el bienestar psicológico de los trabajadores."
                }
              },
              {
                "@type": "Question",
                "name": "¿Qué es el COPASST y cuándo es obligatorio?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "El COPASST (Comité Paritario de Seguridad y Salud en el Trabajo) es obligatorio en empresas con 10 o más trabajadores. Es un organismo de participación donde empleados y empleadores trabajan juntos en la prevención de riesgos laborales, accidentes e incidentes. Las empresas con menos de 10 trabajadores deben designar un Vigía de Seguridad y Salud en el Trabajo."
                }
              },
